<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>TimeZoneMeet</title>
  <style>
    :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
    .wrap { max-width: 560px; }
    input {
      font-size: 1.2rem;
      padding: 0.6rem;
      width: 100%;
      box-sizing: border-box;
    }
    #result { margin-top: 1rem; font-size: 1.1rem; }
    .hint { margin-top: 0.5rem; color: #555; font-size: 0.95rem; }
    .suggestions {
      position: relative;
    }
    .list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ccc;
      border-top: none;
      max-height: 220px;
      overflow-y: auto;
      z-index: 10;
    }
    .item {
      padding: 0.6rem;
      cursor: pointer;
      border-top: 1px solid #eee;
    }
    .item:hover { background: #f6f6f6; }
    .item small { color: #666; }
    .row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    button {
      padding: 0.6rem 0.9rem;
      font-size: 1rem;
      cursor: pointer;
    }
    .muted { color: #666; font-size: 0.95rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Find City Timezone</h1>

    <div class="suggestions">
      <input type="text" id="cityInput" placeholder="Type a city name..." autocomplete="off" />
      <div id="suggestList" class="list" style="display: none;"></div>
    </div>
    <div class="row">
      <button type="button" id="lookupBtn">Lookup</button>
      <button type="button" id="clearBtn">Clear</button>
    </div>
    <div id="result" class="muted"></div>
    <div id="meta" class="muted"></div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
