<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#1a4a8c" />
  <meta name="application-name" content="TimeZoneMeet" />
  <meta name="apple-mobile-web-app-title" content="TimeZoneMeet" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Premium — TimeZoneMeet</title>
  <meta name="description" content="TimeZoneMeet premium checkout confirmation page." />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="canonical" href="https://timezonemeet.app/premium.html" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
  </style>
</head>
<body>
  <p id="msg">Confirming your purchase…</p>
  <script src="consent.js"></script>
  <script src="config.js"></script>
  <script src="apiBase.js"></script>
  <script>
    (async function () {
      var params = new URLSearchParams(location.search);
      var sid = params.get("session_id");
      var msg = document.getElementById("msg");
      if (!sid) {
        msg.textContent = "Missing session. Returning home.";
        setTimeout(function () { location.href = "/"; }, 2000);
        return;
      }
      var base = window.TZM.getApiBase();
      try {
        var res = await fetch(base + "/api/verify-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId: sid }),
        });
        var data = await res.json();
        if (data.token) {
          try {
            localStorage.setItem("tz_premium_token", data.token);
            sessionStorage.setItem("tz_premium_active", "1");
          } catch (e) {
            msg.textContent = "Could not save session.";
            return;
          }
          location.href = "/";
          return;
        }
        msg.textContent = data.error || "Verification failed.";
      } catch (e) {
        msg.textContent = "Network error. Try again from the app.";
      }
    })();
  </script>
</body>
</html>
