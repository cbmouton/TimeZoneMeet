<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Signing in — TimeZoneMeet</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 3rem auto; padding: 0 1rem; }
    .muted { color: #666; }
    .err { color: #a00; }
    .ok { color: #0a0; }
  </style>
</head>
<body>
  <p id="msg" class="muted">Signing you in…</p>

  <script src="config.js"></script>
  <script src="apiBase.js"></script>
  <script>
    (async function () {
      var msg = document.getElementById("msg");
      var params = new URLSearchParams(location.search);
      var token = params.get("token") || "";
      if (!token) {
        msg.className = "err";
        msg.textContent = "Missing token.";
        return;
      }

      var deviceId = window.TZM.getOrCreateDeviceId();
      if (!deviceId) {
        msg.className = "err";
        msg.textContent = "Could not create device id.";
        return;
      }

      try {
        var base = window.TZM.getApiBase();
        var res = await fetch(base + "/api/auth/consume", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, deviceId: deviceId }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          msg.className = "err";
          msg.textContent = (data && data.error) || "Sign-in failed.";
          return;
        }

        if (data.premiumToken) {
          try {
            localStorage.setItem("tz_premium_token", data.premiumToken);
            sessionStorage.setItem("tz_premium_active", data.premium ? "1" : "");
          } catch {}
        }

        msg.className = "ok";
        msg.textContent = data.premium ? "Signed in. Premium restored!" : "Signed in.";
        setTimeout(function () { location.href = "/"; }, 900);
      } catch (e) {
        msg.className = "err";
        msg.textContent = "Network error.";
      }
    })();
  </script>
</body>
</html>
