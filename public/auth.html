<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#1a4a8c" />
  <meta name="application-name" content="TimeZoneMeet" />
  <meta name="apple-mobile-web-app-title" content="TimeZoneMeet" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Signing in — TimeZoneMeet</title>
  <meta name="description" content="TimeZoneMeet sign-in callback page." />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="canonical" href="https://timezonemeet.app/auth.html" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 3rem auto; padding: 0 1rem; }
    .brand-rail {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .brand-rail img {
      width: 96px;
      max-width: 22vw;
      height: auto;
      opacity: 0.85;
      user-select: none;
      pointer-events: none;
    }
    .brand-rail h1 { margin: 0; text-align: center; flex: 1; font-size: 1.2rem; line-height: 1.2; }
    .muted { color: #666; }
    .err { color: #a00; }
    .ok { color: #0a0; }
  </style>
</head>
<body>
  <div class="brand-rail">
    <img src="/icon-192.png" alt="" aria-hidden="true" />
    <h1>Signing in</h1>
    <img src="/icon-192.png" alt="" aria-hidden="true" />
  </div>
  <p id="msg" class="muted">Signing you in…</p>

  <script src="consent.js"></script>
  <script src="config.js"></script>
  <script src="apiBase.js"></script>
  <script>
    (async function () {
      var msg = document.getElementById("msg");
      var params = new URLSearchParams(location.search);
      var token = params.get("token") || "";
      if (!token) {
        msg.className = "err";
        msg.textContent = "Missing token.";
        return;
      }

      var deviceId = window.TZM.getOrCreateDeviceId();
      if (!deviceId) {
        msg.className = "err";
        msg.textContent = "Could not create device id.";
        return;
      }

      try {
        var base = window.TZM.getApiBase();
        var res = await fetch(base + "/api/auth/consume", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, deviceId: deviceId }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          msg.className = "err";
          msg.textContent = (data && data.error) || "Sign-in failed.";
          return;
        }

        if (data.premiumToken) {
          try {
            localStorage.setItem("tz_premium_token", data.premiumToken);
            sessionStorage.setItem("tz_premium_active", data.premium ? "1" : "");
          } catch {}
        }
        if (data.sessionToken) {
          try {
            localStorage.setItem("tz_session_token", data.sessionToken);
          } catch {}
        }

        msg.className = "ok";
        msg.textContent = data.premium ? "Signed in. Premium restored!" : "Signed in.";
        setTimeout(function () { location.href = "/"; }, 900);
      } catch (e) {
        msg.className = "err";
        msg.textContent = "Network error.";
      }
    })();
  </script>
</body>
</html>
